global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: bot
    static_configs:
      - targets: ['bot:9000']

  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: redis
    static_configs:
      - targets: ['redis_exporter:9121']
