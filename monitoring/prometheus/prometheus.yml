global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: bot
    static_configs:
      - targets: ['bot-prod:9000']
        labels:
          stand: prod
      - targets: ['bot-dev:9000']
        labels:
          stand: dev

  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: redis
    static_configs:
      - targets: ['redis_exporter_prod:9121']
        labels:
          stand: prod
      - targets: ['redis_exporter_dev:9121']
        labels:
          stand: dev
