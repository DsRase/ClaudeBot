services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=512MB'
    networks:
      - monitoring
      - claudebot_prod
      - claudebot_dev

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

  redis_exporter_prod:
    image: oliver006/redis_exporter:latest
    container_name: redis_exporter_prod
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis-prod:6379
    networks:
      - monitoring
      - claudebot_prod

  redis_exporter_dev:
    image: oliver006/redis_exporter:latest
    container_name: redis_exporter_dev
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis-dev:6379
    networks:
      - monitoring
      - claudebot_dev

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./loki:/etc/loki:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail:/etc/promtail:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki

networks:
  monitoring:
    driver: bridge
  # default-сети compose-проектов бота. Создаются автоматически
  # при `docker compose up` в /opt/claudebot и /opt/claudebot-dev.
  # Сюда подключаемся, чтобы дотягиваться до bot-prod:9000, bot-dev:9000,
  # redis-prod:6379, redis-dev:6379.
  claudebot_prod:
    external: true
    name: claudebot_default
  claudebot_dev:
    external: true
    name: claudebot-dev_default

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
