services:
  bot:
    image: ghcr.io/dsrase/claudebot:${BOT_VERSION:?BOT_VERSION must be set (e.g. dev, dev-42, prod-42)}
    build:
      context: .
      dockerfile: docker/telegram.Dockerfile
    container_name: bot-${STAND:?STAND must be set (prod|dev)}
    env_file: .env
    restart: unless-stopped
    labels:
      stand: ${STAND}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    expose:
      - "9000"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis-${STAND:?STAND must be set (prod|dev)}
    restart: unless-stopped
    labels:
      stand: ${STAND}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
